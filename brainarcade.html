<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black: #0a0a0f;
      --dark: #0f0f1a;
      --panel: #13131f;
      --neon-blue: #00d4ff;
      --neon-pink: #ff2d78;
      --neon-green: #00ff88;
      --neon-yellow: #ffe600;
      --dim-blue: rgba(0, 212, 255, 0.15);
      --dim-pink: rgba(255, 45, 120, 0.15);
      --text: #e0e8ff;
      --muted: #4a5080;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 99;
    }

    /* Animated grid background */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPan 20s linear infinite;
      z-index: 0;
    }

    @keyframes gridPan {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    .wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 520px;
      padding: 40px 20px 60px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.6s ease both;
    }

    .coin-insert {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--neon-yellow);
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: 18px;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0; }
    }

    .logo {
      position: relative;
      display: inline-block;
    }

    .logo h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(18px, 5vw, 28px);
      color: var(--neon-blue);
      text-shadow:
        0 0 10px var(--neon-blue),
        0 0 30px var(--neon-blue),
        0 0 60px rgba(0, 212, 255, 0.4);
      letter-spacing: 3px;
      line-height: 1.4;
    }

    .logo h1 span {
      color: var(--neon-pink);
      text-shadow:
        0 0 10px var(--neon-pink),
        0 0 30px var(--neon-pink),
        0 0 60px rgba(255, 45, 120, 0.4);
    }

    .logo-underline {
      margin-top: 10px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-pink), transparent);
      animation: lineGlow 2s ease-in-out infinite alternate;
    }

    @keyframes lineGlow {
      from { opacity: 0.6; }
      to { opacity: 1; }
    }

    .score-ticker {
      margin-top: 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--neon-green);
      letter-spacing: 1px;
      text-shadow: 0 0 8px var(--neon-green);
      opacity: 0.8;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-left: 4px;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    /* ── GAME CARDS ── */
    .game-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
      transition: transform 0.15s ease, border-color 0.2s ease;
      animation: fadeUp 0.5s ease both;
    }

    .game-card:nth-child(1) { animation-delay: 0.1s; }
    .game-card:nth-child(2) { animation-delay: 0.18s; }
    .game-card:nth-child(3) { animation-delay: 0.26s; }
    .game-card:nth-child(4) { animation-delay: 0.34s; }
    .game-card:nth-child(5) { animation-delay: 0.42s; }
    .game-card:nth-child(6) { animation-delay: 0.5s; }
    .game-card:nth-child(7) { animation-delay: 0.58s; }

    /* Left color accent bar */
    .game-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent-color, var(--neon-blue));
      box-shadow: 0 0 10px var(--accent-color, var(--neon-blue));
      transition: width 0.2s ease;
    }

    /* Hover shine sweep */
    .game-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }

    .game-card:hover {
      transform: translateX(4px);
      border-color: rgba(255,255,255,0.15);
    }

    .game-card:hover::before {
      width: 5px;
    }

    .game-card:hover::after {
      transform: translateX(100%);
    }

    .game-card.locked {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .game-card.locked:hover {
      transform: none;
    }

    /* Icon slot */
    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      z-index: 1;
    }

    .card-body {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .card-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      line-height: 1.6;
      color: #fff;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .card-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 4px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .badge-play {
      background: rgba(0, 212, 255, 0.1);
      color: var(--neon-blue);
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .badge-lock {
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 48px;
      text-align: center;
      animation: fadeUp 0.5s 0.7s ease both;
    }

    .footer-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--muted);
      letter-spacing: 2px;
      line-height: 2;
    }

    .footer-text span {
      color: var(--neon-pink);
      text-shadow: 0 0 6px var(--neon-pink);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Neon flicker on title */
    @keyframes neonFlicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.85; }
      97% { opacity: 1; }
      98% { opacity: 0.9; }
      99% { opacity: 1; }
    }

    .logo h1 {
      animation: neonFlicker 6s infinite;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="wrapper">

    <header class="header">
      <div class="coin-insert">▶ INSERT COIN ◀</div>
      <div class="logo">
        <h1>BRAIN<br><span>ARCADE</span></h1>
        <div class="logo-underline"></div>
      </div>
      <div class="score-ticker">HI-SCORE &nbsp;00000000</div>
    </header>

    <div class="section-label">— SELECT GAME —</div>

    <div class="game-list" id="gameList"></div>

    <footer class="footer">
      <div class="footer-text">
        © BRAIN ARCADE &nbsp;|&nbsp; <span>PIXELATED-N3RD</span><br>
        ALL RIGHTS RESERVED
      </div>
    </footer>

  </div>

  <script>
    const games = [
      {
        name: "MONKEY TOUCH",
        desc: "Slide puzzle · 4 difficulty levels",
        icon: "🐒",
        file: "INDEX.html",
        accent: "#00d4ff",
        locked: false,
      },
      {
        name: "MONKEY TOUCH 2",
        desc: "Expanding grids · 3×3 to 5×5 hardcore",
        icon: "🔥",
        file: "MonkeyTouch2.html",
        accent: "#ff2d78",
        locked: false,
      },
      {
        name: "FLASH GRID",
        desc: "Memory · tap numbers in order",
        icon: "⚡",
        file: "flash-grid.html",
        accent: "#ffe600",
        locked: false,
      },
      {
        name: "REVERSE TOUCH",
        desc: "Coming soon",
        icon: "🔄",
        file: null,
        accent: "#00ff88",
        locked: true,
      },
      {
        name: "ODD ONE OUT",
        desc: "Coming soon",
        icon: "👁",
        file: null,
        accent: "#b060ff",
        locked: true,
      },
      {
        name: "INVISIBLE PUZZLE",
        desc: "Coming soon",
        icon: "👻",
        file: null,
        accent: "#ff8c00",
        locked: true,
      },
      {
        name: "VANISH NUMBERS",
        desc: "Coming soon",
        icon: "💀",
        file: null,
        accent: "#ff2d78",
        locked: true,
      },
    ];

    const list = document.getElementById("gameList");

    games.forEach((g, i) => {
      const card = document.createElement(g.locked ? "div" : "a");
      card.className = "game-card" + (g.locked ? " locked" : "");
      if (!g.locked) card.href = g.file;
      card.style.setProperty("--accent-color", g.accent);

      card.innerHTML = `
        <div class="card-icon">${g.icon}</div>
        <div class="card-body">
          <div class="card-name">${g.name}</div>
          <div class="card-desc">${g.desc}</div>
        </div>
        <div class="card-badge ${g.locked ? 'badge-lock' : 'badge-play'}">
          ${g.locked ? "SOON" : "PLAY"}
        </div>
      `;

      list.appendChild(card);
    });

    // Animated hi-score counter
    let score = 0;
    const target = 847320;
    const ticker = document.querySelector(".score-ticker");
    const step = Math.ceil(target / 80);
    const interval = setInterval(() => {
      score = Math.min(score + step, target);
      ticker.textContent = `HI-SCORE  ${String(score).padStart(8, "0")}`;
      if (score >= target) clearInterval(interval);
    }, 20);

    // ── LOOPING BACKGROUND CHIPTUNE ──────────────────────────────
    const AC = new (window.AudioContext || window.webkitAudioContext)();
    let muted = false;
    let loopTimer = null;

    const masterGain = AC.createGain();
    masterGain.gain.value = 0.13; // low background volume — present but not loud
    masterGain.connect(AC.destination);

    // Mute toggle button
    const muteBtn = document.createElement("button");
    muteBtn.textContent = "♪ ON";
    Object.assign(muteBtn.style, {
      position:"fixed", bottom:"18px", right:"18px",
      fontFamily:"'Press Start 2P',monospace", fontSize:"7px",
      padding:"8px 12px", borderRadius:"6px",
      border:"1px solid rgba(0,212,255,0.3)",
      background:"rgba(0,212,255,0.08)", color:"#00d4ff",
      cursor:"pointer", zIndex:"300", letterSpacing:"1px"
    });
    muteBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      muted = !muted;
      masterGain.gain.value = muted ? 0 : 0.13;
      muteBtn.textContent = muted ? "♪ OFF" : "♪ ON";
      muteBtn.style.color = muted ? "#4a5080" : "#00d4ff";
    });
    document.body.appendChild(muteBtn);

    // Convert note name + octave to Hz
    function freq(note, oct) {
      const map = {C:0,Cs:1,D:2,Ds:3,E:4,F:5,Fs:6,G:7,Gs:8,A:9,As:10,B:11};
      return 440 * Math.pow(2, ((oct+1)*12 + map[note] - 69) / 12);
    }

    // Note with envelope
    function chip(hz, t, dur, vol=0.5, type="square") {
      const osc = AC.createOscillator(), g = AC.createGain();
      osc.type = type; osc.frequency.value = hz;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t+0.012);
      g.gain.setValueAtTime(vol, t+dur-0.02);
      g.gain.linearRampToValueAtTime(0, t+dur);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t+dur+0.02);
    }

    function bass(hz, t, dur) { chip(hz, t, dur, 0.55, "triangle"); }

    function snare(t, dur=0.06, vol=0.5) {
      const buf = AC.createBuffer(1, AC.sampleRate*dur, AC.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const src=AC.createBufferSource(), g=AC.createGain(), f=AC.createBiquadFilter();
      src.buffer=buf; f.type="bandpass"; f.frequency.value=3200;
      g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      src.connect(f); f.connect(g); g.connect(masterGain);
      src.start(t); src.stop(t+dur+0.01);
    }

    function kick(t) {
      const osc=AC.createOscillator(), g=AC.createGain();
      osc.frequency.setValueAtTime(200,t);
      osc.frequency.exponentialRampToValueAtTime(40,t+0.09);
      g.gain.setValueAtTime(1.0,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.13);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t+0.15);
    }

    // ── MUSIC — Mario Overworld inspired, relaxed ~100 BPM ──
    function playLoop(t0) {
      const Q = 0.30; // quarter note = 0.30s (~100 BPM, nice and relaxed)
      const E = Q/2;  // eighth note
      const H = Q*2;  // half note
      const D = Q*1.5;// dotted quarter

      // Helper: melody note with a slightly bouncy staccato feel
      function m(n, o, t, dur, vol=0.72) {
        chip(freq(n,o), t, dur * 0.82, vol);
      }

      // ── MELODY (square wave, lead voice) ──
      // Phrase A — the iconic jump motif feel
      m("E",5,  t0+Q*0,  E);
      m("E",5,  t0+Q*0+E*2, E);
      m("E",5,  t0+Q*1+E,   E);
      m("C",5,  t0+Q*2,  E);
      m("E",5,  t0+Q*2+E*2, Q);
      m("G",5,  t0+Q*3+E,   H);
      m("G",4,  t0+Q*5+E,   H);

      // Phrase B — stepping down
      m("C",5,  t0+Q*7+E,  D);
      m("G",4,  t0+Q*9,    E);
      m("E",4,  t0+Q*10,   D);
      m("A",4,  t0+Q*11+E, Q);
      m("B",4,  t0+Q*12+E, Q);
      m("As",4, t0+Q*13+E, Q);
      m("A",4,  t0+Q*14+E, Q);

      // Phrase C — going up
      m("G",4,  t0+Q*15+E, E);
      m("E",5,  t0+Q*16+E, E);
      m("G",5,  t0+Q*17,   D);
      m("A",5,  t0+Q*18+E, Q);
      m("F",5,  t0+Q*19+E, E);
      m("G",5,  t0+Q*20,   E);

      // Phrase D — resolution back home
      m("E",5,  t0+Q*20+E*2, Q);
      m("C",5,  t0+Q*21+E,   E);
      m("D",5,  t0+Q*22,     E);
      m("B",4,  t0+Q*22+E*2, D);

      // loop turnaround — same as phrase A start so it loops clean
      m("E",5,  t0+Q*24,     E);
      m("E",5,  t0+Q*24+E*2, E);

      const totalDur = Q*25;

      // ── BASS (triangle, simple oom-pah) ──
      const bassLine = [
        ["C",3,0],["G",3,1],["C",3,2],["G",3,3],
        ["G",3,4],["D",3,5],["G",3,6],["D",3,7],
        ["C",3,8],["G",3,9],["E",3,10],["A",3,11],
        ["A",3,12],["E",3,13],["A",3,14],["E",3,15],
        ["C",3,16],["G",3,17],["C",3,18],["G",3,19],
        ["C",3,20],["G",3,21],["G",3,22],["D",3,23],
        ["C",3,24]
      ];
      bassLine.forEach(([n,o,beat]) => bass(freq(n,o), t0+Q*beat, Q*0.7));

      // ── HARMONY (sawtooth, quiet chords on beats 2&4) ──
      const chords = [
        ["E",4,1],["E",4,3],["G",4,5],["G",4,7],
        ["C",4,9],["A",4,11],["A",4,13],["A",4,15],
        ["E",4,17],["F",4,19],["C",4,21],["G",4,23]
      ];
      chords.forEach(([n,o,beat]) => chip(freq(n,o), t0+Q*beat, E*0.8, 0.18, "sawtooth"));

      // ── PERCUSSION — gentle, not overpowering ──
      // Soft kick every bar (every 4 quarter notes)
      for (let i=0; i<totalDur/Q; i+=4) kick(t0+Q*i);
      // Very soft hi-hat on every quarter note
      for (let i=0; i<totalDur/Q; i++)  snare(t0+Q*i, 0.02, 0.12);
      // Light snare on beats 2 and 4
      for (let i=1; i<totalDur/Q; i+=2) snare(t0+Q*i, 0.05, 0.28);

      return totalDur * 1000; // ms
    }

    // Seamless loop scheduler
    function scheduleLoop() {
      const t0 = AC.currentTime + 0.05;
      const durationMs = playLoop(t0);
      // Re-schedule slightly before end to avoid gap
      loopTimer = setTimeout(scheduleLoop, durationMs - 80);
    }

    function startMusic() {
      if (loopTimer) clearTimeout(loopTimer);
      scheduleLoop();
    }

    // Browser autoplay policy handler
    function tryPlay() {
      AC.resume().then(startMusic);
      muteBtn.textContent = "♪ ON";
      muteBtn.style.color = "#00d4ff";
      muteBtn.style.borderColor = "rgba(0,212,255,0.3)";
      document.removeEventListener("click", tryPlay);
      document.removeEventListener("keydown", tryPlay);
    }

    if (AC.state === "running") {
      setTimeout(startMusic, 200);
    } else {
      muteBtn.textContent = "▶ TAP";
      muteBtn.style.color = "#ffe600";
      muteBtn.style.borderColor = "rgba(255,230,0,0.4)";
      document.addEventListener("click", tryPlay, { once: true });
      document.addEventListener("keydown", tryPlay, { once: true });
    }
  </script>
</body>
</html>
